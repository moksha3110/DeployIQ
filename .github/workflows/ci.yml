name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace apps/backend

      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test

      # Informational only (see docs/SECURITY.md) — dependency vulnerabilities
      # are surfaced in CI output, not a merge gate. `|| true` because `npm
      # audit` exits non-zero the moment it finds anything, which would turn
      # every dependency bump into a failing build for issues we may not be
      # able to fix immediately (transitive deps, no patch released yet).
      - name: Dependency audit (informational)
        run: npm audit --audit-level=high || true

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      # No backend needed — every spec mocks the API (see apps/frontend/e2e/README.md
      # for why real GitHub OAuth can't be exercised here).
      - name: Run Playwright e2e tests
        run: npm run test:e2e --workspace apps/frontend

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 7
